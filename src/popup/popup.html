<!DOCTYPE html>
<html lang="en">
<!-- Amazon Sponsored Blocker - Popup Interface -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Sponsored Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7v9c0 5.25 3.85 10.14 9 11 5.15-.86 9-5.75 9-11V7l-9-5z" fill="url(#grad-shield)"/>
          <path d="M9 12.5l2 2 4-4" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad-shield" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#06b6d4" />
              <stop offset="100%" stop-color="#8b5cf6" />
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">NoAds<span class="highlight">Zone</span></span>
      </div>
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="power-toggle" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="status-indicator">
      <span class="pulse-dot" id="status-dot"></span>
      <span id="status-text">Shield Active</span>
    </div>

    <div class="stats-section">
      <div class="stat-box">
        <span class="stat-value" id="session-count">0</span>
        <span class="stat-label">This Session</span>
      </div>
      <div class="stat-box">
        <span class="stat-value" id="total-count">0</span>
        <span class="stat-label">All Time</span>
      </div>
    </div>

    <div class="features-list">
      <div class="feature-item">
        <span class="feature-icon">✨</span>
        <span class="feature-name">Clean Search Results</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">🛡️</span>
        <span class="feature-name">Hiding Sponsored Items</span>
      </div>
    </div>

    <div class="footer">
      <span>v1.0.0</span>
      <a href="#" id="reset-stats">Reset Stats</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
